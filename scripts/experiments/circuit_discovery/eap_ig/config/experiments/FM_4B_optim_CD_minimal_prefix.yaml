setup:
  model: "Qwen/Qwen3-4B-Instruct-2507"
  seed: 0
  batch_size: 64
  dtype: "bfloat16"
  granularity: "fine"

paths:
  data_loc: "./data/raw/temporal_scope"
  save_loc: "./results/eap_integrated_gradients/model_exploration"

input:
  data_file: "temporal_scope_explicit_expanded_500.json"
  template: "{}\n\n{}\n{}"
  option_keys: [ "(A)", "(B)" ]
  prompt_suffix: ""

output:
  wandb_project: "model_exploration"
  filename: "Qwen3-4B-Instruct-2507"

parameters:
  system_prompt: "Reply with only the letter of the correct answer: A or B"
  steps: [ 20 ]
  metric_type: "logit-diff"
