# Phase 3 experiment defaults
# These can be overridden via CLI arguments in each experiment script.

# Models to evaluate
models:
  - Llama-3.1-8B-Instruct
  - Llama-3.1-8B
  - Qwen3-8B
  - Qwen3-4B-Instruct-2507
  - Qwen3-30B-A3B
  - DeepSeek-R1-Distill-Qwen-7B
  - Ouro-2.6B

# Repetition counts for degradation curves
rep_counts: [1, 2, 5, 10, 20, 50]

# Activation extraction
extraction:
  layers: "auto"            # Use model-specific defaults from MODEL_CONFIGS
  module_types:
    - resid_post
  positions: last
  stream_to: cpu
  batch_size: 4
  dtype: float16

# Probing
probing:
  classifier: LogisticRegression
  max_iter: 1000
  cv_folds: 5
  random_state: 42

# W&B
wandb:
  project: patience-degradation
  entity: justinshenk-time
